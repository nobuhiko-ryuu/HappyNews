name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend tests (external-zero)
        env:
          EXTERNAL_MODE: stub
        run: cd backend && pytest tests/ -v --ignore=tests/nightly

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create google-services.json for CI
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cat > android/app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "happynews-dev-ci",
              "storage_bucket": "happynews-dev-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.happynews.app"
                  }
                },
                "api_key": [{ "current_key": "DUMMY_API_KEY_FOR_CI" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Run Android unit tests
        run: cd android && ./gradlew testDebugUnitTest --no-daemon
