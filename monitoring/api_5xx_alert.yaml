# BE-061: API 5xx エラーアラートポリシー
displayName: HappyNews API 5xx Alert
combiner: OR
conditions:
  - displayName: API 5xx rate high
    conditionThreshold:
      filter: >
        resource.type = "cloud_run_revision"
        AND resource.labels.service_name = "happynews-api"
        AND metric.type = "run.googleapis.com/request_count"
        AND metric.labels.response_code_class = "5xx"
      comparison: COMPARISON_GT
      thresholdValue: 5
      duration: 60s
      aggregations:
        - alignmentPeriod: 60s
          perSeriesAligner: ALIGN_SUM
notificationChannels: []
alertStrategy:
  autoClose: 1800s
